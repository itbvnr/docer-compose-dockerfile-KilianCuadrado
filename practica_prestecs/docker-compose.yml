version: "3.8"

services:
  c_bd3:
    image: mariadb:10.6
    container_name: c_bd3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_prestecs
      MYSQL_USER: user_prestecs
      MYSQL_PASSWORD: pwd
    volumes:
      - prestecs_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    restart: unless-stopped

  c_web:
    build: .
    container_name: c_web
    ports:
      - "8080:80"
    volumes:
      - ./index.php:/var/www/html/index.php:z
    depends_on:
      - c_bd3
    environment:
      DB_HOST: c_bd3
      DB_NAME: db_prestecs
      DB_USER: user_prestecs
      DB_PASS: pwd
    restart: unless-stopped

volumes:
  prestecs_db_data:
